---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: placementbindings.experimental.kubefleet.dev
spec:
  group: experimental.kubefleet.dev
  names:
    categories:
    - kubefleet
    - kubefleet-experimental
    kind: PlacementBinding
    listKind: PlacementBindingList
    plural: placementbindings
    singular: placementbinding
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: PlacementBinding is the KubeFleet API that binds a placement
          to a specific member cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: The specification of the binding.
            properties:
              clusterName:
                description: The name of the member cluster that this binding is associated
                  with.
                type: string
              clusterSelector:
                description: |-
                  The cluster selector associated with this binding.

                  This field is added for informational purposes only.
                properties:
                  count:
                    anyOf:
                    - type: integer
                    - type: string
                    default: 1
                    description: |-
                      The number of clusters that KubeFleet should select from the clusters that match the given selectors.

                      The default value is 1. To select all clusters that match the given selectors, use the value "All".
                    pattern: ^([1-9][0-9]{0,2}|All)$
                    x-kubernetes-int-or-string: true
                    x-kubernetes-validations:
                    - message: count must be unset or set to 1
                      rule: (type(self) == int && self == 1) || (type(self) == string
                        && self == '1')
                  terms:
                    description: |-
                      A list of terms that form the selector. The terms are ORed, i.e., a cluster would match the selector
                      if it matches any of the terms.

                      If not specified, the selector will match all clusters.
                    items:
                      properties:
                        matchClusterPropertyExpressions:
                          description: A list of cluster property expressions that
                            a cluster must all satisfy to match this selector term.
                          items:
                            properties:
                              key:
                                description: The key of the label or cluster property
                                  that selector applies to.
                                type: string
                              operator:
                                description: |-
                                  The operator that specifies the relational between the current value under the key and the given values.

                                  If the operation is In, NotIn, Exists, or DoesNotExist, the key must be one referring to a label, or to a string-based
                                  cluster property.
                                  If the operation is Gt, Lt, Ge, Le, Eq, or Ne, the key must be one referring to a numeric-based cluster property.
                                  Applying an unsupported operator to a key will cause an error at the scheduling phase.
                                enum:
                                - In
                                - NotIn
                                - Exists
                                - DoesNotExist
                                - Gt
                                - Lt
                                - Ge
                                - Le
                                - Eq
                                - Ne
                                type: string
                              values:
                                description: |-
                                  The values that are used in conjunction with the operator to determine if a selector matches.

                                  If the operator is In or NotIn, the values array must be non-empty.
                                  If the operator is Exists or DoesNotExist, the values array must be empty.
                                  If the operator is Gt, Lt, Ge, Le, Eq, or Ne, the values array must contain exactly one element.
                                items:
                                  type: string
                                type: array
                            required:
                            - key
                            - operator
                            type: object
                            x-kubernetes-validations:
                            - message: values must be non-empty when operator is In
                                or NotIn
                              rule: '(self.operator == ''In'' || self.operator ==
                                ''NotIn'') ? (has(self.values) && size(self.values)
                                > 0) : true'
                            - message: values must be empty when operator is Exists
                                or DoesNotExist
                              rule: '(self.operator == ''Exists'' || self.operator
                                == ''DoesNotExist'') ? (!has(self.values) || size(self.values)
                                == 0) : true'
                            - message: values must contain exactly one element when
                                operator is Gt, Lt, Ge, Le, Eq, or Ne
                              rule: '(self.operator == ''Gt'' || self.operator ==
                                ''Lt'' || self.operator == ''Ge'' || self.operator
                                == ''Le'' || self.operator == ''Eq'' || self.operator
                                == ''Ne'') ? (has(self.values) && size(self.values)
                                == 1) : true'
                          type: array
                        matchLabelExpressions:
                          description: A list of label expressions that a cluster
                            must all satisfy to match this selector term.
                          items:
                            properties:
                              key:
                                description: The key of the label or cluster property
                                  that selector applies to.
                                type: string
                              operator:
                                description: |-
                                  The operator that specifies the relational between the current value under the key and the given values.

                                  If the operation is In, NotIn, Exists, or DoesNotExist, the key must be one referring to a label, or to a string-based
                                  cluster property.
                                  If the operation is Gt, Lt, Ge, Le, Eq, or Ne, the key must be one referring to a numeric-based cluster property.
                                  Applying an unsupported operator to a key will cause an error at the scheduling phase.
                                enum:
                                - In
                                - NotIn
                                - Exists
                                - DoesNotExist
                                - Gt
                                - Lt
                                - Ge
                                - Le
                                - Eq
                                - Ne
                                type: string
                              values:
                                description: |-
                                  The values that are used in conjunction with the operator to determine if a selector matches.

                                  If the operator is In or NotIn, the values array must be non-empty.
                                  If the operator is Exists or DoesNotExist, the values array must be empty.
                                  If the operator is Gt, Lt, Ge, Le, Eq, or Ne, the values array must contain exactly one element.
                                items:
                                  type: string
                                type: array
                            required:
                            - key
                            - operator
                            type: object
                            x-kubernetes-validations:
                            - message: values must be non-empty when operator is In
                                or NotIn
                              rule: '(self.operator == ''In'' || self.operator ==
                                ''NotIn'') ? (has(self.values) && size(self.values)
                                > 0) : true'
                            - message: values must be empty when operator is Exists
                                or DoesNotExist
                              rule: '(self.operator == ''Exists'' || self.operator
                                == ''DoesNotExist'') ? (!has(self.values) || size(self.values)
                                == 0) : true'
                            - message: values must contain exactly one element when
                                operator is Gt, Lt, Ge, Le, Eq, or Ne
                              rule: '(self.operator == ''Gt'' || self.operator ==
                                ''Lt'' || self.operator == ''Ge'' || self.operator
                                == ''Le'' || self.operator == ''Eq'' || self.operator
                                == ''Ne'') ? (has(self.values) && size(self.values)
                                == 1) : true'
                          type: array
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: A list of label key-value pairs that a cluster
                            must have to match this selector term.
                          type: object
                      type: object
                    maxItems: 5
                    type: array
                    x-kubernetes-validations:
                    - message: terms must contain at most one item and only matchLabels
                        may be set
                      rule: size(self) <= 1 && (size(self) == 0 || (!has(self[0].matchLabelExpressions)
                        && !has(self[0].matchClusterPropertyExpressions)))
                type: object
              clusterSelectorHash:
                description: The hash of the cluster selector associated with this
                  binding.
                type: string
              placementPolicyName:
                description: The name of the placement policy that this binding is
                  associated with.
                type: string
              resourceSnapshotName:
                description: The name of the resource snapshot that this binding is
                  associated with.
                type: string
              suspended:
                default: false
                description: |-
                  Whether the binding is suspended. If true, KubeFleet will remove resources
                  from the associated cluster.
                type: boolean
            required:
            - clusterName
            - clusterSelector
            - clusterSelectorHash
            - placementPolicyName
            type: object
          status:
            description: The observed status of the binding.
            properties:
              conditions:
                description: A list of observed conditions about the binding.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              failedToSyncResources:
                description: The number of resources that cannot be synced to the
                  target cluster.
                format: int32
                type: integer
              lastSyncedResourceSnapshotName:
                description: The name of the last synced resource snapshot.
                type: string
              selectedResources:
                description: The number of resources that are included in the last
                  synced resource snapshot.
                format: int32
                type: integer
              unavailableResources:
                description: The number of resources that are not yet available in
                  the target cluster.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
