---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: kustomizereleases.experimental.kubefleet.dev
spec:
  group: experimental.kubefleet.dev
  names:
    categories:
    - kubefleet
    - kubefleet-experimental
    kind: KustomizeRelease
    listKind: KustomizeReleaseList
    plural: kustomizereleases
    singular: kustomizerelease
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          KustomizeRelease is the KubeFleet API that represents a Kustomize application from an
          OCI artifact for placement.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: The specification of the kustomize release.
            properties:
              kustomizeArtifactRef:
                description: The reference to the OCI artifact that contains the Kustomize
                  application.
                properties:
                  name:
                    description: The name of the OCI artifact. The object must be
                      in the same namespace as the helm release object.
                    type: string
                type: object
              options:
                description: |-
                  The options for processing the Kustomize application from the OCI artifact.

                  KubeFleet will merge the setup here into the Kustomize configuration file and build the manifests
                  from the merged configuration. If the same value is specified in both the Kustomize configuration file
                  and the setup here, the value here will take precedence.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: |-
                      The annotation overrides to apply to the Kustomize application. This is equivalent to the `commonAnnotations`
                      field in the Kustomize configuration file. See the Kustomize documentation for more information.
                    type: object
                  components:
                    description: |-
                      The components to enable in the Kustomize application. This is equivalent to the `components` field in the Kustomize
                      configuration file. See the Kustomize documentation for more information.
                    items:
                      type: string
                    type: array
                  images:
                    description: |-
                      The image overrides to apply to the Kustomize application. This is equivalent to the `images` field in the Kustomize
                      configuration file. See the Kustomize documentation for more information.
                    items:
                      properties:
                        name:
                          description: The name of the image to override. See the
                            Kustomize documentation for more information.
                          type: string
                        newName:
                          description: The new name to use for the image. See the
                            Kustomize documentation for more information.
                          type: string
                        newTag:
                          description: The tag to use for the image. See the Kustomize
                            documentation for more information.
                          type: string
                      type: object
                      x-kubernetes-validations:
                      - message: at least one of newTag or newName must be set
                        rule: has(self.newTag) || has(self.newName)
                    type: array
                  labels:
                    description: |-
                      The label overrides to apply to the Kustomize application. This is equivalent to the `labels` field in the Kustomize
                      configuration file. See the Kustomize documentation for more information.
                    items:
                      properties:
                        includeSelectors:
                          description: Whether to include the labels in the selector
                            fields. See the Kustomize documentation for more information.
                          type: boolean
                        includeTemplates:
                          description: Whether to include the labels in the pod template
                            metadata. See the Kustomize documentation for more information.
                          type: boolean
                        includeVolumeClaimTemplates:
                          description: Whether to include the labels in the volume
                            claim templates. See the Kustomize documentation for more
                            information.
                          type: boolean
                        pairs:
                          additionalProperties:
                            type: string
                          description: The labels to apply. See the Kustomize documentation
                            for more information.
                          type: object
                      type: object
                    type: array
                  namePrefix:
                    description: |-
                      The prefix to add to the names of all resources listed in the Kustomize configuration file. This is equivalent
                      to the `namePrefix` field in the Kustomize configuration file. See the Kustomize documentation for more
                      information.
                    type: string
                  nameSuffix:
                    description: |-
                      The suffix to add to the names of all resources listed in the Kustomize configuration file. This is equivalent
                      to the `nameSuffix` field in the Kustomize configuration file. See the Kustomize documentation for more
                      information.
                    type: string
                  namespace:
                    description: |-
                      The namespace to apply to all resources listed in the Kustomize configuration file. This is equivalent
                      to the `namespace` field in the Kustomize configuration file. See the Kustomize documentation for more information.
                    type: string
                  patches:
                    description: |-
                      The patches to apply to the Kustomize application. This is equivalent to the `patches` field in the Kustomize
                      configuration file. See the Kustomize documentation for more information.
                    items:
                      properties:
                        options:
                          description: The options for applying the patch.
                          properties:
                            allowKindChange:
                              description: Whether to allow the patch to modify the
                                kind of the resource(s).
                              type: boolean
                            allowNameChange:
                              description: Whether to allow the patch to modify the
                                name of the resource(s).
                              type: boolean
                          type: object
                        patch:
                          description: The patch data to apply.
                          format: byte
                          type: string
                        path:
                          description: The path to the a file within the OCI artifact
                            (after extraction) that contains the patch to be applied.
                          type: string
                        target:
                          description: The target resource(s) where the patch will
                            be applied.
                          properties:
                            annotationSelector:
                              description: The annotation selector to select the resource(s).
                              type: string
                            group:
                              description: The API group of the resource(s).
                              type: string
                            kind:
                              description: The kind of the resource(s).
                              type: string
                            labelSelector:
                              description: The label selector to select the resource(s).
                              type: string
                            name:
                              description: The name of the resource.
                              type: string
                            version:
                              description: The API version of the resource(s).
                              type: string
                          type: object
                      type: object
                      x-kubernetes-validations:
                      - message: at least one of path or patch must be set
                        rule: has(self.path) || has(self.patch)
                    type: array
                  replicas:
                    description: |-
                      The replica overrides to apply to the Kustomize application. This is equivalent to the `replicas` field in the Kustomize
                      configuration file. See the Kustomize documentation for more information.
                    items:
                      properties:
                        count:
                          description: The new replica count to use for the resource.
                            See the Kustomize documentation for more information.
                          format: int32
                          type: integer
                        name:
                          description: The name of the resource to override the replica
                            count for. See the Kustomize documentation for more information.
                          type: string
                      type: object
                    type: array
                type: object
              path:
                description: |-
                  The path to the directory within the OCI artifact (after extraction) that contains the
                  Kustomize configuration file, `kustomization.yaml`, `kustomization.yml`, or `kustomization`.

                  The default is `.` (the root of the extracted OCI artifact).
                type: string
            type: object
          status:
            description: The observed status of the kustomize release.
            properties:
              conditions:
                description: A list of observed conditions of the manifest release.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
